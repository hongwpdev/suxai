<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수자이(水Xai)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111318;
            color: #e8eaf0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Header */
        .header { margin-bottom: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; color: #e8eaf0; margin-bottom: 4px; }
        .header p  { font-size: 12px; color: #5a6070; }

        /* News Ticker */
        .ticker-wrap {
            overflow: hidden;
            background: #0e1117;
            border-top: 1px solid #1e2230;
            border-bottom: 1px solid #1e2230;
            padding: 8px 0;
            margin: 12px -1.5rem;
        }
        .ticker-inner {
            display: inline-flex;
            align-items: center;
            animation: ticker 40s linear infinite;
            white-space: nowrap;
        }
        .ticker-inner:hover { animation-play-state: paused; }
        @keyframes ticker {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }
        .ticker-label {
            background: #e8453c;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: .08em;
            padding: 2px 12px;
            margin-right: 20px;
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            border-radius: 2px;
        }
        .ticker-item { margin-right: 56px; font-size: 13px; }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid #23272f; margin-top: 16px; }
        .tab-btn {
            background: transparent;
            border: none;
            color: #5a6070;
            font-size: 13px;
            padding: 8px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color .15s;
            outline: none;
        }
        .tab-btn.active { color: #e8eaf0; border-bottom-color: #e8453c; }
        .tab-btn:hover  { color: #e8eaf0; }
        .tab-content         { display: none; padding-top: 16px; }
        .tab-content.active  { display: block; }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0 8px;
        }
        .section-title { font-size: 18px; font-weight: 700; color: #e8eaf0; }
        .btn-refresh {
            background: #1e2230;
            border: 1px solid #23272f;
            color: #a0a8b8;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-refresh:hover { background: #23272f; }

        /* Subtitle */
        .subtitle { font-size: 12px; color: #5a6070; margin-bottom: 20px; }

        /* Station Cards */
        .s-card {
            background: #181b22;
            border: 1px solid #23272f;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .s-card.crit { border-left: 3px solid #e8453c; }
        .s-card.warn { border-left: 3px solid #f5a623; }
        .s-card.ok   { border-left: 3px solid transparent; }

        .rank    { font-family: monospace; font-size: 11px; color: #5a6070; min-width: 24px; }
        .st-info { flex: 1; min-width: 0; }
        .st-name { font-size: 14px; font-weight: 600; color: #e8eaf0; margin-bottom: 2px; }
        .st-loc  { font-size: 11px; color: #5a6070; }

        .metrics { display: flex; gap: 20px; margin-left: auto; }
        .metric  { text-align: right; }
        .metric-lbl { font-size: 10px; color: #5a6070; margin-bottom: 2px; }
        .metric-val { font-family: monospace; font-size: 13px; font-weight: 500; }
        .c-ok   { color: #e8eaf0; }
        .c-warn { color: #f5a623; }
        .c-crit { color: #e8453c; }

        .bdg      { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; font-family: monospace; }
        .bdg-ok   { background: rgba(62,207,112,.10);  color: #3ecf70; }
        .bdg-warn { background: rgba(245,166,35,.12);  color: #f5a623; }
        .bdg-crit { background: rgba(232,69,60,.12);   color: #e8453c; }

        .empty-msg { color: #5a6070; font-size: 13px; text-align: center; padding: 40px 0; }

        /* 상단 로딩바 */
        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, #e8453c, #f5a623);
            transition: width .3s ease;
            z-index: 9999;
            border-radius: 0 2px 2px 0;
        }
        .progress-bar.done { transition: width .2s ease, opacity .4s ease .2s; opacity: 0; }

        /* 카드 로딩 스켈레톤 */
        .skeleton {
            background: #181b22;
            border: 1px solid #23272f;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 6px;
            height: 54px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to   { transform: translateX(100%); }
        }

        /* AI 분석 패널 */
        .ai-panel {
            background: #181b22;
            border: 1px solid #23272f;
            border-radius: 8px;
            padding: 20px 24px;
            margin-top: 8px;
        }
        .ai-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 11px;
            color: #5a6070;
        }
        .ai-badge {
            background: rgba(138,99,255,.15);
            color: #a78bfa;
            font-size: 10px;
            font-weight: 700;
            font-family: monospace;
            padding: 2px 10px;
            border-radius: 3px;
        }
        .ai-body {
            font-size: 13px;
            line-height: 1.75;
            color: #c8cad4;
            white-space: pre-wrap;
        }
        .ai-body strong, .ai-body b {
            color: #e8eaf0;
            font-weight: 600;
        }
        .ai-skeleton {
            background: #181b22;
            border: 1px solid #23272f;
            border-radius: 8px;
            padding: 20px 24px;
            margin-top: 8px;
        }
        .ai-skeleton-line {
            height: 13px;
            background: #23272f;
            border-radius: 4px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .ai-skeleton-line::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
            animation: shimmer 1.2s infinite;
        }
        .ai-stat {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>💧 수자이(水Xai)</h1>
        <p>실시간 전국 수질·유량 이상징후 감지 대시보드</p>
    </div>

    <!-- News Ticker -->
    <div class="ticker-wrap">
        <div class="ticker-inner" id="tickerInner"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('wq', this)">수질</button>
        <button class="tab-btn"        onclick="switchTab('fl',  this)">유량</button>
        <button class="tab-btn"        onclick="switchTab('ai',  this)">AI 분석</button>
    </div>

    <!-- 수질 Tab -->
    <div id="tab-wq" class="tab-content active">
        <div class="section-header">
            <div class="section-title">실시간 수질 현황 (전국)</div>
            <button class="btn-refresh" onclick="fetchWaterQuality()">조회</button>
        </div>
        <div class="subtitle" id="wq-subtitle"></div>
        <div id="wq-cards"></div>
    </div>

    <!-- 유량 Tab -->
    <div id="tab-fl" class="tab-content">
        <div class="section-header">
            <div class="section-title">실시간 유량 현황 (전국)</div>
            <button class="btn-refresh" onclick="fetchWaterFlux()">조회</button>
        </div>
        <div class="subtitle" id="fl-subtitle"></div>
        <div id="fl-cards"></div>
    </div>

    <!-- AI 분석 Tab -->
    <div id="tab-ai" class="tab-content">
        <div class="section-header">
            <div class="section-title">AI 이상징후 분석</div>
            <button class="btn-refresh" onclick="fetchAnalysis()">분석 실행</button>
        </div>
        <div class="subtitle">수질·유량 데이터를 AI가 종합 분석합니다 (5분 캐시)</div>
        <div id="ai-result"></div>
    </div>

</div>

<script>
    // ── Tab 전환 ─────────────────────────────────────────────
    function switchTab(name, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    // ── 유틸 ─────────────────────────────────────────────────
    function metricHTML(label, value, cls) {
        return `<div class="metric">
            <div class="metric-lbl">${label}</div>
            <div class="metric-val ${cls}">${value}</div>
        </div>`;
    }

    // ── 수질 카드 ─────────────────────────────────────────────
    function wqCardHTML(rank, r) {
        const ph  = parseFloat(r.phVal)  || 0;
        const tb  = parseFloat(r.tbVal)  || 0;
        const cl  = parseFloat(r.clVal)  || 0;

        const phCls = (ph < 5.8 || ph > 9.0) ? 'c-crit' : (ph < 6.5 || ph > 8.5) ? 'c-warn' : 'c-ok';
        const tbCls = tb > 1.0 ? 'c-crit' : tb > 0.5 ? 'c-warn' : 'c-ok';
        const clCls = (cl < 0.05 || cl > 4.0) ? 'c-crit' : (cl < 0.1 || cl > 2.0) ? 'c-warn' : 'c-ok';

        const hasCrit = [phCls, tbCls, clCls].includes('c-crit');
        const hasWarn = [phCls, tbCls, clCls].includes('c-warn');
        const cardCls = hasCrit ? 'crit' : hasWarn ? 'warn' : 'ok';

        return `<div class="s-card ${cardCls}">
            <span class="rank">#${rank}</span>
            <div class="st-info">
                <div class="st-name">${r.facilityName}</div>
                <div class="st-loc">${r.address} &nbsp;|&nbsp; ${r.measuredAt}</div>
            </div>
            <div class="metrics">
                ${metricHTML('pH',    ph.toFixed(2),           phCls)}
                ${metricHTML('탁도',  tb.toFixed(4) + ' NTU',  tbCls)}
                ${metricHTML('잔류염소', cl.toFixed(4) + ' mg/L', clCls)}
            </div>
            <span class="bdg bdg-ok">${r.divName}</span>
        </div>`;
    }

    // ── 유량 카드 ─────────────────────────────────────────────
    function flCardHTML(rank, r) {
        const divCls = r.divType === '순간' ? 'bdg-ok' : 'bdg-warn';
        return `<div class="s-card ok">
            <span class="rank">#${rank}</span>
            <div class="st-info">
                <div class="st-name">${r.facilityName}</div>
                <div class="st-loc">${r.description}</div>
            </div>
            <div class="metrics">
                ${metricHTML('측정값', `${r.value} ${r.unit}`, 'c-ok')}
                ${metricHTML('측정시간', r.measuredAt, 'c-ok')}
            </div>
            <span class="bdg ${divCls}">${r.divType}</span>
        </div>`;
    }

    // ── 로딩바 제어 ──────────────────────────────────────────
    function startProgress() {
        const bar = document.getElementById('progressBar');
        bar.style.opacity = '1';
        bar.classList.remove('done');
        bar.style.width = '0%';
        requestAnimationFrame(() => { bar.style.width = '70%'; });
    }
    function finishProgress() {
        const bar = document.getElementById('progressBar');
        bar.style.width = '100%';
        setTimeout(() => { bar.classList.add('done'); }, 200);
    }

    function showSkeleton(cardsId, count = 5) {
        document.getElementById(cardsId).innerHTML =
            Array(count).fill('<div class="skeleton"></div>').join('');
    }

    function showAiSkeleton() {
        document.getElementById('ai-result').innerHTML = `
            <div class="ai-skeleton">
                <div class="ai-skeleton-line" style="width:30%"></div>
                <div class="ai-skeleton-line" style="width:90%"></div>
                <div class="ai-skeleton-line" style="width:80%"></div>
                <div class="ai-skeleton-line" style="width:85%; margin-top:16px"></div>
                <div class="ai-skeleton-line" style="width:70%"></div>
                <div class="ai-skeleton-line" style="width:75%; margin-top:16px"></div>
                <div class="ai-skeleton-line" style="width:60%"></div>
            </div>`;
    }

    // ── API 호출 ─────────────────────────────────────────────
    async function fetchWaterQuality() {
        startProgress();
        showSkeleton('wq-cards');
        try {
            const data = await fetch('/api/waterQuality').then(r => r.json());
            document.getElementById('wq-subtitle').textContent = '최신 데이터 순';
            document.getElementById('wq-cards').innerHTML = data.length
                ? data.map((r, i) => wqCardHTML(i + 1, r)).join('')
                : '<div class="empty-msg">데이터가 존재하지 않습니다.</div>';
        } finally {
            finishProgress();
        }
    }

    async function fetchWaterFlux() {
        startProgress();
        showSkeleton('fl-cards');
        try {
            const data = await fetch('/api/waterFlow').then(r => r.json());
            document.getElementById('fl-subtitle').textContent = '최신 데이터 순';
            document.getElementById('fl-cards').innerHTML = data.length
                ? data.map((r, i) => flCardHTML(i + 1, r)).join('')
                : '<div class="empty-msg">데이터가 존재하지 않습니다.</div>';
        } finally {
            finishProgress();
        }
    }

    async function fetchAnalysis() {
        startProgress();
        showAiSkeleton();
        try {
            const d = await fetch('/api/analysis').then(r => r.json());
            const wqStat = d.wqCount > 0
                ? `<span class="ai-stat">수질 <b style="color:#e8eaf0">${d.wqCount}건</b></span>`
                : `<span class="ai-stat">수질 <b style="color:#5a6070">데이터 없음</b></span>`;
            const flStat = d.flCount > 0
                ? `<span class="ai-stat">유량 <b style="color:#e8eaf0">${d.flCount}건</b></span>`
                : `<span class="ai-stat">유량 <b style="color:#5a6070">데이터 없음</b></span>`;

            // **텍스트** 볼드 변환
            const html = d.analysis
                .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');

            document.getElementById('ai-result').innerHTML = `
                <div class="ai-panel">
                    <div class="ai-meta">
                        <span class="ai-badge">Groq AI</span>
                        ${wqStat} &nbsp;·&nbsp; ${flStat}
                        &nbsp;·&nbsp; ${d.analyzedAt} 기준
                    </div>
                    <div class="ai-body">${html}</div>
                </div>`;
        } finally {
            finishProgress();
        }
    }

    async function fetchNews() {
        const news = await fetch('/api/news').then(r => r.json());
        const colorMap = { crit: '#e8453c', warn: '#f5a623', ok: '#5a6070' };
        const iconMap  = { crit: '🔴',      warn: '🟡',      ok: '⚪' };
        const items = news.map(n =>
            `<span class="ticker-item" style="color:${colorMap[n.level]}">${iconMap[n.level]}&nbsp;&nbsp;${n.text}</span>`
        ).join('');
        document.getElementById('tickerInner').innerHTML =
            `<span class="ticker-label">뉴스</span>${items}<span class="ticker-label">뉴스</span>${items}`;
    }

    // ── 초기화 ─────────────────────────────────────────────────
    fetchWaterQuality();
    fetchWaterFlux();
</script>
</body>
</html>
